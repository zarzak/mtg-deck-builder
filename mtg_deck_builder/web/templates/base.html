<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MTG Deck Builder{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #151821;
      --border: #262b36;
      --text: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #7aa2ff;
      --added: #3fb88a;
      --removed: #e05a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 16px; line-height: 1.5;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 1rem; }
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
    }
    nav .container { padding: 0; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    nav a {
      color: var(--text); text-decoration: none;
      padding: 0.25rem 0.5rem; border-radius: 4px;
    }
    nav a:hover { background: var(--border); }
    nav .brand { font-weight: 600; color: var(--accent); }
    h1 { font-size: 1.4rem; margin: 0 0 0.75rem 0; }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem 0; color: var(--accent); }
    label { display: block; font-size: 0.9rem; color: var(--muted); margin-top: 0.75rem; }
    label input[type=checkbox] { margin-right: 0.5rem; }
    input[type=text], input[type=number], select, textarea {
      display: block; width: 100%;
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.5rem; font-size: 1rem;
      font-family: inherit;
    }
    textarea { min-height: 5rem; font-family: monospace; font-size: 0.9rem; }
    button {
      background: var(--accent); color: #000;
      border: none; border-radius: 4px;
      padding: 0.6rem 1.25rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 1rem;
    }
    button:hover { opacity: 0.9; }
    .error {
      background: #2a1a1a; border-left: 3px solid var(--removed);
      padding: 0.75rem 1rem; border-radius: 4px; margin: 1rem 0;
    }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 1rem; margin: 1rem 0;
    }
    .fieldset-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem 1rem;
    }
    @media (max-width: 600px) {
      .fieldset-grid { grid-template-columns: 1fr; }
    }
    code {
      background: var(--panel); padding: 2px 6px; border-radius: 3px;
      font-size: 0.85em;
    }
    .muted { color: var(--muted); font-size: 0.9rem; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
<nav>
  <div class="container">
    <a class="brand" href="/">MTG Deck Builder</a>
    <a href="/build">Build</a>
    <a href="/diff">Diff</a>
    <a href="/analyze">Analyze</a>
    <a href="/tags">Tags</a>
  </div>
</nav>
<main class="container">
  {% block content %}{% endblock %}
</main>
</body>
</html>
